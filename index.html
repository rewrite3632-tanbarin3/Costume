<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLASTONIA Photo Wedding - Costume Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous-basic.min.css">
    <style>
        :root {
            --champagne: #f4eee0;
            --greige: #9e9488;
            --dark-navy: #1a2a3a;
            --white: #ffffff;
            --gold: #c5a059;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', 'Noto Serif JP', serif;
            color: var(--dark-navy);
            line-height: 1.8;
            background-color: var(--white);
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('images/hero_antonio.jpg') center/cover no-repeat; /* 画像パスは適宜修正 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
        }

        .hero-content h1 {
            font-size: 3rem;
            letter-spacing: 0.2em;
            margin-bottom: 20px;
        }

        /* Section Styling */
        section {
            padding: 100px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            letter-spacing: 0.1em;
            margin-bottom: 60px;
            position: relative;
        }

        h2::after {
            content: "";
            display: block;
            width: 50px;
            height: 1px;
            background: var(--gold);
            margin: 20px auto 0;
        }

        /* Gallery Grid */
        .costume-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        .costume-item {
            text-align: center;
            transition: transform 0.3s ease;
        }

        .costume-item:hover {
            transform: translateY(-5px);
        }

        .image-wrapper {
            overflow: hidden;
            background-color: var(--champagne);
            aspect-ratio: 2 / 3;
            margin-bottom: 15px;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
            cursor: zoom-in;
        }

        .image-wrapper img:hover {
            opacity: 0.8;
        }

        .brand-name {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: var(--greige);
        }

        .price-tag {
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 0.05em;
        }

        /* Category Tabs (Simplified) */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-nav a {
            text-decoration: none;
            color: var(--greige);
            font-size: 0.8rem;
            border: 1px solid var(--greige);
            padding: 8px 20px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .filter-nav a:hover {
            background: var(--dark-navy);
            color: var(--white);
            border-color: var(--dark-navy);
        }

        footer {
            background: var(--champagne);
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1>ANTONIO RIVA</h1>
            <p>一生に一度の輝きを纏う、至福のフォトウェディング</p>
        </div>
    </div>

    <section id="gallery">
        <h2>COSTUME COLLECTION</h2>

        <div class="filter-nav">
            <a href="#">Wedding Dress</a>
            <a href="#">Color Dress</a>
            <a href="#">Tuxedo</a>
            <a href="#">Traditional Japanese</a>
        </div>

        <div class="costume-grid">
            <div class="costume-item">
                <div class="image-wrapper">
                    <a href="images/import_en1005.jpg" class="zoom-link">
                        <img src="images/import_en1005.jpg" alt="Import Dress EN1005">
                    </a>
                </div>
                <div class="brand-name">Import Collection (EN/E/KF)</div>
                <div class="price-tag">+ ¥132,000</div>
            </div>

            <div class="costume-item">
                <div class="image-wrapper">
                    <a href="images/kh_v2192.jpg" class="zoom-link">
                        <img src="images/kh_v2192.jpg" alt="KIYOKO HATA V2192">
                    </a>
                </div>
                <div class="brand-name">KIYOKO HATA</div>
                <div class="price-tag">+ ¥88,000</div>
            </div>

            <div class="costume-item">
                <div class="image-wrapper">
                    <a href="images/isamu_v1125.jpg" class="zoom-link">
                        <img src="images/isamu_v1125.jpg" alt="ISAMU MORITA V1125">
                    </a>
                </div>
                <div class="brand-name">ISAMU MORITA</div>
                <div class="price-tag">+ ¥66,000</div>
            </div>

            <div class="costume-item">
                <div class="image-wrapper">
                    <a href="images/dolce_dlc088.jpg" class="zoom-link">
                        <img src="images/dolce_dlc088.jpg" alt="Dolce VIVIAN DLC088">
                    </a>
                </div>
                <div class="brand-name">Dolce VIVIAN</div>
                <div class="price-tag">+ ¥0</div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 GLASTONIA Photo Wedding. All Rights Reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous.min.js"></script>
    <script>
        // 全ての拡大用リンクにライトボックスを適用
        new LuminousGallery(document.querySelectorAll('.zoom-link'));
    </script>
</body>
</html>
