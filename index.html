    <style>
        :root { --gold: #b5a47e; --bg: #fdfdfb; --price-color: #a67c00; --brand-color: #888; }
        body { font-family: 'Noto Serif JP', serif; background-color: var(--bg); color: #333; margin: 0; padding-bottom: 50px; scroll-behavior: smooth; }
        header { text-align: center; padding: 50px 20px; background: #fff; border-bottom: 1px solid #f0f0f0; }
        header h1 { letter-spacing: 0.25em; font-weight: 300; font-size: 1.6rem; margin: 0; line-height: 1.5; }
        .nav-menu { position: sticky; top: 0; background: rgba(255,255,255,0.95); padding: 15px; text-align: center; z-index: 100; border-bottom: 1px solid #eee; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-menu a { text-decoration: none; color: #666; font-size: 0.8rem; border: 1px solid #ccc; padding: 6px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-menu a:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .category-section { margin-top: 60px; }
        .category-title { font-size: 1.6rem; border-left: 5px solid var(--gold); padding-left: 15px; margin-bottom: 30px; font-weight: 600; letter-spacing: 0.1em; color: #444; }
        .dress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .dress-item { background: #fff; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; transition: 0.3s; border-radius: 2px; position: relative; }
        .dress-item:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .photo-count { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; pointer-events: none; z-index: 10; }
        .main-photo-wrapper { position: relative; margin-bottom: 10px; }
        .dress-item img.main-img { width: 100%; height: auto; cursor: pointer; aspect-ratio: 3/4; object-fit: cover; display: block; border-radius: 2px; }
        .thumb-container { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; min-height: 40px; }
        .thumb-item { width: 42px; height: 56px; cursor: pointer; border: 1px solid #eee; border-radius: 2px; overflow: hidden; transition: 0.2s; }
        .thumb-item:hover { border-color: var(--gold); opacity: 0.8; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
        .dress-info { padding: 12px 0 5px; border-top: 1px solid #eee; margin-top: 10px; }

        @media (max-width: 600px) { .dress-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } header h1 { font-size: 1.2rem; } .thumb-item { width: 38px; height: 50px; } }

<script>
    function getInfo(filename, categoryKey) {
        const originalName = filename.toUpperCase();
        let cleanName = filename.replace(/＿/g, "_").replace(/\.[^/.]+$/, "").trim();
        let baseID = cleanName.replace(/^\d+\./, ""); 

        baseID = baseID.replace(/ANTONIO\s*RIVA|ANTONIORIVA|ANTONIO|RIVA/gi, "")
                       .replace(/JILL\s*STUART/gi, "")
                       .replace(/(_OffWhite|_image|_bluegreen|_orange|_Pink|_nm02|_全|_名|sideback|着脱|ベージュ|ｸﾞﾚｰｼﾞｭ|★|◎)/gi, "");
        
        baseID = baseID.replace(/[①-⑨]/g, ""); 
        baseID = baseID.replace(/[山名山]/g, ""); 
        baseID = baseID.replace(/(_|-|\s)+([0-9a-zA-Z]{1,3})$/, "");
        baseID = baseID.replace(/^[_\s-]+|[_\s-]+$/g, "").trim();

        const upperBase = baseID.toUpperCase().replace(/-/g, ""); // 判定用にハイフン除去
        let brand = "VIVIAN";
        let priceValue = 44000;

        // 個別指定およびブランド・価格判定
        if (originalName.includes("OPブラウス") || originalName.includes("OPBLOUSE")) {
            brand = "IMPORT SELECTION"; priceValue = 132000;
        } else if (upperBase === "V1145" || upperBase === "V1135") {
            brand = "LUXE"; priceValue = 66000;
        } else if (upperBase === "V1136" || upperBase === "V1137") {
            brand = "DEWY"; priceValue = 66000;
        } else if (upperBase === "V1138") {
            brand = "ANNNA BLANCA"; priceValue = 66000;
        } else if (upperBase === "V1152") {
            brand = "Delafore"; priceValue = 66000;
        } else if (originalName.match(/SOPHIA|URSULA|SIBILLA|SISSI|ADELAIDE|CRISTINA|LUCIA|ANTONIO/)) {
            brand = "ANTONIO RIVA"; priceValue = 220000;
        } else if (upperBase.match(/^(EN|E0|KF|R10|RA10|GENOISE)/)) {
            brand = "IMPORT SELECTION"; priceValue = 132000;
        } else if (upperBase.match(/^(KH|ST)/) || upperBase === "V2192") {
            brand = "KIYOKO HATA"; priceValue = 88000;
        } else if (upperBase.match(/^(V1125|V1140|V1141|V1151|V2176|V2182|V2239|V2225|V2157)/)) {
            brand = "ISAMU MORITA"; priceValue = 66000;
        } else if (upperBase.startsWith("JILL") || originalName.includes("JILL")) {
            brand = "JILL STUART"; priceValue = 66000;
        } else if (upperBase.startsWith("ANT")) {
            brand = "ANTEPRIMA"; priceValue = 66000;
        } else if (upperBase.startsWith("LA")) {
            brand = "LAURA ASHLEY"; priceValue = 66000;
        } else if (upperBase.startsWith("RV") && !upperBase.startsWith("RVT")) {
            brand = "Royal VIVIAN"; priceValue = 88000;
        } else if (upperBase.startsWith("DL") || upperBase.startsWith("DLC")) {
            brand = "Dolce VIVIAN"; priceValue = 44000;
        } else if (upperBase.startsWith("RVT") || upperBase.startsWith("V3")) {
            brand = (upperBase.startsWith("RVT")) ? "Royal VIVIAN" : "VIVIAN";
            priceValue = 44000;
        } else if (upperBase === "V1139") {
            brand = "AMANTHA BRIDE";
        } else if (upperBase.match(/(白無垢|大和|K\d+)/)) {
            brand = "TRADITIONAL";
        }

        let priceText = `+ ¥${priceValue.toLocaleString()}`;
        if (categoryKey === 'plan') {
            priceText = "plan ¥0";
            let planOrderScore = 99;
            if (upperBase.match(/^(RV|DL\d)/) && !upperBase.startsWith("RVT")) { planOrderScore = 1; } 
            else if (upperBase.match(/^(V2|DLC)/)) { planOrderScore = 2; } 
            else if (upperBase.startsWith("RVT") || upperBase.startsWith("V3")) { planOrderScore = 3; } 
            else if (upperBase.match(/(白無垢|大和|K\d+)/)) { planOrderScore = 4; }
            priceValue = planOrderScore; 
        }

        return { brand, displayName: baseID, priceText, priceValue, baseID };
    }

            const groups = {};
            category.files.forEach(file => {
                const info = getInfo(file, key);
                const groupKey = `${info.brand}-${info.baseID}`;
                if (!groups[groupKey]) groups[groupKey] = { info, files: [] };
                groups[groupKey].files.push(file);
            });
            const sortedGroups = Object.values(groups).sort((a, b) => a.info.priceValue - b.info.priceValue);
            sortedGroups.forEach(group => {
                const info = group.info;
                const galleryId = `gallery-${info.baseID.replace(/[^a-zA-Z0-9]/g, '')}`;
                const div = document.createElement('div');
                div.className = 'dress-item';
                const mainFile = group.files[0];
                div.innerHTML = `
                    ${group.files.length > 1 ? `<div class="photo-count">${group.files.length} Photos</div>` : ""}
                    <div class="main-photo-wrapper">
                        <a href="images/${category.folder}/${mainFile}" class="zoom" data-luminous-group="${galleryId}">
                            <img src="images/${category.folder}/${mainFile}" class="main-img" alt="${info.displayName}" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'; console.log('Missing: ${mainFile}')">
                        </a>
                    </div>
                    <div class="thumb-container">
                        ${group.files.length > 1 ? group.files.map(f => `
                            <a href="images/${category.folder}/${f}" class="thumb-item zoom" data-luminous-group="${galleryId}">
                                <img src="images/${category.folder}/${f}" onerror="this.style.display='none'">
                            </a>`).join('') : ''}
                    </div>
                    <div class="dress-info">
                        <div class="brand-name">${info.brand}</div>
                        <div class="dress-id">${info.displayName}</div>
                        <div class="dress-price">${info.priceText}</div>
                    </div>
                `;
                grid.appendChild(div);
            });
        });
        initLuminous();
    }

    function initLuminous() {
        new LuminousGallery(document.querySelectorAll('.zoom'), {}, {
            arrowNavigation: true,
            onOpen: () => {
                const lightbox = document.querySelector('.lum-lightbox');
                if (lightbox) {
                    lightbox.addEventListener('click', (e) => {
                        if (e.target === lightbox || e.target.classList.contains('lum-lightbox-inner')) {
                            document.querySelector('.lum-close').click();
                        }
                    });
                }
            }
        });
    }
    document.addEventListener('DOMContentLoaded', generateGrids);
</script>
</body>
</html>
